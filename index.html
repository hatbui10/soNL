<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - PRO V2 (1-4)</title>
    <style>
        :root { 
            --neon: #00f3ff; --pink: #ff00ff; --bg: #030305;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --yellow: #ffff00;
        }

        body { 
            background: var(--bg); color: #fff; font-family: system-ui, sans-serif; 
            margin: 20px 10px; min-height: 100vh;
        }

        .box { max-width: 900px; margin: 0 auto; background: var(--glass); backdrop-filter: blur(20px); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; align-items: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }

        /* Style cho hàng nút chọn chế độ quét - Cập nhật để chứa 4 nút */
        .mode-row { display: flex; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; justify-content: center; }
        .btn-mode {
            background: #000; border: 1px solid #444; color: #888;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
            font-size: 12px;
        }
        .btn-mode.active {
            border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
        }

        .count-row { display: flex; gap: 10px; width: 100%; justify-content: center; margin: 5px 0; }
        .count-mini-card { flex: 1; max-width: 150px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; padding: 5px; text-align: center; }
        .count-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        .count-value { font-size: 48px; font-weight: 900; font-family: 'Courier New', monospace; line-height: 1; text-shadow: 0 0 15px currentColor; }

        .c-small { border-color: var(--neon); color: var(--neon); }
        .c-large { border-color: var(--pink); color: var(--pink); }

        #alertBox {
            width: 80%; max-width: 350px; padding: 20px; margin-top: 10px;
            background: rgba(255, 255, 0, 0.1); border: 2px solid var(--yellow);
            border-radius: 15px; color: var(--yellow); text-align: center;
            font-weight: 900; font-size: 24px; display: none; 
            animation: blink 1s infinite; letter-spacing: 2px; white-space: pre;
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 15px var(--yellow); }
            50% { opacity: 0.5; box-shadow: none; }
            100% { opacity: 1; box-shadow: 0 0 15px var(--yellow); }
        }

        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        
        #numN { width: 110px; text-align: center; font-size: 1.4em; border-color: var(--neon); color: var(--neon); letter-spacing: 3px; font-weight: 900; }
        #numM { width: 55px; text-align: center; font-size: 1.4em; border-color: var(--pink); color: var(--pink); font-weight: 900; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: start; }
        textarea { 
            width: 100%; min-height: 60px; background: rgba(0,0,0,0.4); 
            color: #ffffff; border: 1px solid var(--border); border-radius: 10px; 
            padding: 12px; font-family: monospace; font-size: 22px; 
            font-weight: bold; resize: none; overflow: hidden; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="box">
    <div id="msg" style="text-align:center; font-size:11px; color:var(--neon); margin-bottom:10px; font-family:monospace;">HỆ THỐNG SẴN SÀNG</div>
    
    <div class="controls">
        <div class="input-row">
            <input type="file" id="f" multiple style="width: 120px; font-size: 10px;">
            <div class="mode-row">
                <button class="btn-mode" id="btn1" onclick="setMode(1)">Q1</button>
                <button class="btn-mode" id="btn2" onclick="setMode(2)">Q2</button>
                <button class="btn-mode active" id="btn3" onclick="setMode(3)">Q3</button>
                <button class="btn-mode" id="btn4" onclick="setMode(4)">Q4</button>
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="numN" placeholder="---" readonly tabindex="-1">
            <input type="tel" id="numM" placeholder="M">
        </div>

        <div class="count-row">
            <div class="count-mini-card c-small">
                <div class="count-label">MAX SL < 5</div>
                <div id="valS" class="count-value">0</div>
            </div>
            <div class="count-mini-card c-large">
                <div class="count-label">MAX SL ≥ 5</div>
                <div id="valL" class="count-value">0</div>
            </div>
        </div>

        <div id="alertBox"></div>
    </div>

    <div class="grid">
        <div class="col">
            <div style="font-size: 11px; color: #888; text-align: center; margin-bottom: 5px; font-weight: bold;">DÃY NHỎ (< 5)</div>
            <textarea id="os" readonly></textarea>
        </div>
        <div class="col">
            <div style="font-size: 11px; color: #888; text-align: center; margin-bottom: 5px; font-weight: bold;">DÃY LỚN (≥ 5)</div>
            <textarea id="ol" readonly></textarea>
        </div>
    </div>
</div>

<script>
    let raw = localStorage.getItem('big_data') || "";
    let scanMode = 3; 

    const inputN = document.getElementById('numN'), inputM = document.getElementById('numM');
    const outS = document.getElementById('os'), outL = document.getElementById('ol');
    const valS = document.getElementById('valS'), valL = document.getElementById('valL');
    const alertBox = document.getElementById('alertBox');
    const msg = document.getElementById('msg');

    window.onload = () => {
        inputM.focus();
        if (raw) msg.innerText = "DỮ LIỆU SẴN SÀNG: " + raw.length;
    };

    // Hàm chuyển đổi chế độ quét từ 1 đến 4
    function setMode(m) {
        scanMode = m;
        // Xóa active tất cả các nút
        [1,2,3,4].forEach(num => {
            document.getElementById('btn' + num).classList.toggle('active', num === m);
        });

        // Điều chỉnh độ rộng và placeholder linh hoạt
        const widths = { 1: "60px", 2: "80px", 3: "100px", 4: "120px" };
        const placeholders = { 1: "-", 2: "--", 3: "---", 4: "----" };
        
        inputN.style.width = widths[m];
        inputN.placeholder = placeholders[m];
        
        inputN.value = "";
        inputM.focus();
    }

    function autoResize(el) {
        el.style.height = 'auto'; 
        el.style.height = el.scrollHeight + 'px';
    }

    document.getElementById('f').onchange = async (e) => {
        let newContent = "";
        for (let file of e.target.files) {
            newContent += (await file.text()).replace(/\s+/g, '').replace(/[^0-9]/g, '');
        }
        if (newContent) {
            localStorage.removeItem('big_data'); 
            raw = newContent; 
            localStorage.setItem('big_data', raw);
            msg.innerText = "NẠP MỚI: " + raw.length + " SỐ";
            inputN.value = "";
            outS.value = ""; outL.value = "";
            valS.innerText = "0"; valL.innerText = "0";
            alertBox.style.display = "none";
        }
        e.target.value = ""; 
        inputM.focus();
    };

    inputM.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        const cleanVal = val.replace(/[^0-9]/g, '');
        if (!cleanVal) { e.target.value = ""; return; }
        
        let currentN = inputN.value.replace(/[^0-9]/g, '');
        // Cắt theo scanMode (1, 2, 3 hoặc 4)
        currentN = (currentN + cleanVal.slice(-1)).slice(-scanMode);
        
        inputN.value = currentN;
        e.target.value = "";
        autoCalc(currentN);
    });

    function autoCalc(target) {
        if (!raw || target.length < scanMode) return;
        let resS = new Set(), resL = new Set(), i = raw.indexOf(target);

        while (i !== -1) {
            let start = i + target.length, s = "", l = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n < 5) s += n; else break;
            }
            if (s) resS.add(target + "-" + s);
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n >= 5) l += n; else break;
            }
            if (l) resL.add(target + "-" + l);
            i = raw.indexOf(target, i + 1);
        }

        const sortFn = (a, b) => b.length - a.length;
        const sortedS = Array.from(resS).sort(sortFn);
        const sortedL = Array.from(resL).sort(sortFn);

        outS.value = sortedS.join('\n');
        outL.value = sortedL.join('\n');

        const lenS = sortedS.length > 0 ? sortedS[0].split('-')[1].length : 0;
        const lenL = sortedL.length > 0 ? sortedL[0].split('-')[1].length : 0;

        valS.innerText = lenS;
        valL.innerText = lenL;

        if (lenS === 0 && lenL === 0) {
            alertBox.style.display = "none";
        } else {
            alertBox.style.display = "block";
            const s5 = "     "; 
            if (lenS > lenL) {
                alertBox.innerText = `Dùng${s5}NHỎ   ${lenS}  lần`;
            } else if (lenL > lenS) {
                alertBox.innerText = `Dùng${s5}LỚN   ${lenL}  lần`;
            } else {
                alertBox.innerText = `cân bằng${s5}${lenS}    lần`;
            }
        }
        autoResize(outS); autoResize(outL);
    }

    document.addEventListener('click', (e) => {
        if(!['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) {
            inputM.focus();
        }
    });
</script>
</body>
</html>
