<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sequence Analyzer - Pro</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px; /* Rule: 30px top, 3px sides */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }

        input[type="number"], input[type="file"] {
            background: #1a1a1a;
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .display-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .column {
            display: flex; flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            color: var(--neon-blue);
            font-size: 0.85em;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: #000;
            color: #00ff41;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        #inputNum {
            width: 120px;
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <input type="file" id="fileInput" multiple accept=".txt">
        <input type="number" id="inputNum" placeholder="Nhập số..." inputmode="numeric">
        
        <div class="btn-group">
            <button onclick="analyze(1)">Loại 1</button>
            <button onclick="analyze(2)">Loại 2</button>
            <button onclick="analyze(3)">Loại 3</button>
            <button onclick="analyze(4)">Loại 4</button>
        </div>
        
        <button onclick="clearData()" style="border-color: #ff4444; color: #ff4444;">Xóa</button>
    </div>

    <div class="display-area">
        <div class="column">
            <label>DÃY NHỎ (< 5) - DÀI NHẤT TRÊN CÙNG</label>
            <textarea id="outputSmall" readonly></textarea>
        </div>
        <div class="column">
            <label>DÃY LỚN (≥ 5) - DÀI NHẤT TRÊN CÙNG</label>
            <textarea id="outputLarge" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const inputNum = document.getElementById('inputNum');
    const outputSmall = document.getElementById('outputSmall');
    const outputLarge = document.getElementById('outputLarge');

    // Load data từ LocalStorage
    let combinedData = localStorage.getItem('storedNumbers') || "";

    fileInput.addEventListener('change', async (e) => {
        let files = e.target.files;
        let newContent = "";
        for (let file of files) {
            let text = await file.text();
            newContent += text;
        }
        // Làm sạch: chỉ giữ lại số
        combinedData += newContent.replace(/[^0-9]/g, '');
        localStorage.setItem('storedNumbers', combinedData);
        
        inputNum.focus();
        alert("Đã nạp thêm dữ liệu!");
    });

    function analyze(typeCount) {
        const target = inputNum.value.trim();
        if (!target || combinedData === "") {
            alert("Thiếu số nhập hoặc chưa có dữ liệu file!");
            return;
        }

        // Kiểm tra độ dài số nhập vào có khớp với loại nút bấm không
        if (target.length !== typeCount) {
            alert(`Vui lòng nhập đúng ${typeCount} số cho loại này!`);
            return;
        }

        let smallList = [];
        let largeList = [];

        // Duyệt chuỗi để tìm target
        for (let i = 0; i <= combinedData.length - target.length; i++) {
            // Cắt một đoạn bằng độ dài target để so sánh
            if (combinedData.substring(i, i + target.length) === target) {
                let j = i + target.length;
                let seqSmall = "";
                let seqLarge = "";

                // Nhánh tìm số nhỏ (< 5)
                let tempJ = j;
                while (tempJ < combinedData.length) {
                    let next = parseInt(combinedData[tempJ]);
                    if (next < 5) seqSmall += next;
                    else break;
                    tempJ++;
                }

                // Nhánh tìm số lớn (>= 5)
                tempJ = j;
                while (tempJ < combinedData.length) {
                    let next = parseInt(combinedData[tempJ]);
                    if (next >= 5) seqLarge += next;
                    else break;
                    tempJ++;
                }

                if (seqSmall.length > 0) smallList.push(`${target}-${seqSmall}`);
                if (seqLarge.length > 0) largeList.push(`${target}-${seqLarge}`);
            }
        }

        // --- SẮP XẾP DÀI NHẤT LÊN TRÊN ---
        smallList.sort((a, b) => b.length - a.length);
        largeList.sort((a, b) => b.length - a.length);

        // Hiển thị kết quả
        outputSmall.value = smallList.join('\n');
        outputLarge.value = largeList.join('\n');
    }

    function clearData() {
        if(confirm("Xóa sạch dữ liệu trong máy?")) {
            localStorage.removeItem('storedNumbers');
            combinedData = "";
            outputSmall.value = "";
            outputLarge.value = "";
            inputNum.value = "";
            alert("Đã xóa sạch.");
        }
    }
</script>

</body>
</html>
