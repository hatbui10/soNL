<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN168 PRO - Cập Nhật File Trực Tiếp</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px; /* Quy tắc 3 cạnh */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Khu vực nút Upload */
        .upload-section {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .btn-upload {
            flex: 1;
            padding: 10px 5px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #333;
            background: #111;
            white-space: nowrap;
        }

        .btn-p1 { color: #ffff00; border-color: #ffff00; }
        .btn-p2 { color: #0088ff; border-color: #0088ff; }
        .btn-p3 { color: #ff00ff; border-color: #ff00ff; }

        /* Khu vực nhập liệu */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .num-box {
            width: 65px;
            height: 85px;
            background: #111;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        #n4 {
            background: #1a1a1a;
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            outline: none;
            text-align: center;
            caret-color: transparent;
        }

        .result-box {
            width: 100%;
            max-width: 450px;
            padding: 30px 15px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 15px;
            text-align: center;
        }

        #finalResult {
            font-size: 24px;
            font-weight: 900;
            min-height: 36px;
        }

        .p1-style { color: #ffff00; text-shadow: 0 0 15px #ffff00; }
        .p2-style { color: #0088ff; text-shadow: 0 0 15px #0088ff; }
        .p3-style { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <div class="upload-section">
        <label class="btn-upload btn-p1">
            TẢI LỚN (P1) <input type="file" hidden onchange="handleFile(this, 'p1')">
        </label>
        <label class="btn-upload btn-p2">
            TẢI NHỎ (P2) <input type="file" hidden onchange="handleFile(this, 'p2')">
        </label>
        <label class="btn-upload btn-p3">
            TẢI TR.GIAN (P3) <input type="file" hidden onchange="handleFile(this, 'p3')">
        </label>
    </div>

    <div class="input-group">
        <div class="num-box" id="n1">-</div>
        <div class="num-box" id="n2">-</div>
        <div class="num-box" id="n3">-</div>
        <input type="number" pattern="\d*" inputmode="numeric" class="num-box" id="n4" placeholder="?">
    </div>

    <div class="result-box">
        <div id="finalResult">CHỜ DỮ LIỆU...</div>
    </div>

<script>
    // Bộ nhớ dữ liệu
    let DATA = {
        p1: new Set(),
        p2: new Set(),
        p3: new Set()
    };

    const inputN4 = document.getElementById('n4');
    const boxes = [document.getElementById('n1'), document.getElementById('n2'), document.getElementById('n3')];
    const displayResult = document.getElementById('finalResult');

    window.onload = () => {
        inputN4.focus();
        loadFromStorage();
    };

    document.addEventListener('click', () => inputN4.focus());

    // Xử lý khi chọn file
    function handleFile(input, type) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            const numbers = content.match(/\d{3}/g) || [];
            DATA[type] = new Set(numbers);
            
            // Lưu vào LocalStorage
            localStorage.setItem(`vn168_file_${type}`, JSON.stringify(numbers));
            alert(`Đã tải ${numbers.length} số vào danh sách ${type.toUpperCase()}`);
            checkResult();
        };
        reader.readAsText(file);
    }

    // Input dịch trái
    inputN4.addEventListener('input', function() {
        let val = this.value.slice(-1);
        if (val === "" || isNaN(val)) return;

        boxes[0].innerText = boxes[1].innerText;
        boxes[1].innerText = boxes[2].innerText;
        boxes[2].innerText = val;

        this.value = "";
        saveCurrentBoxes();
        checkResult();
    });

    function checkResult() {
        let s1 = boxes[0].innerText;
        let s2 = boxes[1].innerText;
        let s3 = boxes[2].innerText;

        if (s1 === "-" || s2 === "-" || s3 === "-") return;

        let numStr = s1 + s2 + s3;

        if (DATA.p1.has(numStr)) {
            displayResult.innerText = "LỚN LỚN LỚN LỚN LỚN LỚN";
            displayResult.className = "p1-style";
        } else if (DATA.p2.has(numStr)) {
            displayResult.innerText = "NHỎ NHỎ NHỎ NHỎ NHỎ NHỎ";
            displayResult.className = "p2-style";
        } else if (DATA.p3.has(numStr)) {
            displayResult.innerText = "TRUNG GIAN";
            displayResult.className = "p3-style";
        } else {
            displayResult.innerText = "KHÔNG CÓ TRONG FILE";
            displayResult.className = "";
        }
    }

    function saveCurrentBoxes() {
        const data = boxes.map(b => b.innerText);
        localStorage.setItem('vn168_boxes', JSON.stringify(data));
    }

    function loadFromStorage() {
        // Load số đang nhập dở
        const savedBoxes = localStorage.getItem('vn168_boxes');
        if (savedBoxes) {
            const data = JSON.parse(savedBoxes);
            data.forEach((val, i) => boxes[i].innerText = val);
        }

        // Load dữ liệu từ các file đã tải trước đó
        ['p1', 'p2', 'p3'].forEach(type => {
            const savedFile = localStorage.getItem(`vn168_file_${type}`);
            if (savedFile) {
                DATA[type] = new Set(JSON.parse(savedFile));
            }
        });
        
        checkResult();
    }
</script>

</body>
</html>
