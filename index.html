<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Master Pro - Horizontal Layout</title>
    <style>
        :root { 
            --neon: #00f3ff; --pink: #ff00ff; --bg: #030305;
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 30px 3px 0 3px; /* Rule: 30px top, 3px sides */
        }

        .box { 
            max-width: 1000px; margin: 0 auto; background: var(--glass);
            backdrop-filter: blur(20px); padding: 15px; border: 1px solid var(--border); border-radius: 15px; 
        }

        .controls { 
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; 
            justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.4);
            padding: 10px; border-radius: 12px;
        }

        input { 
            background: #000; border: 2px solid var(--border); 
            color: #fff; padding: 5px; border-radius: 6px; outline: none; font-weight: 900;
        }

        #numN { width: 80px; text-align: center; font-size: 1.8em; border-color: var(--neon); color: var(--neon); letter-spacing: 2px; }
        #numM { width: 50px; text-align: center; font-size: 1.8em; border-color: var(--pink); color: var(--pink); }
        
        /* CẤU TRÚC HÀNG NGANG CHO S VÀ L */
        .record-container { 
            display: flex; 
            gap: 8px; 
            align-items: center;
        }
        
        .record-box {
            display: flex;
            align-items: center; /* Căn giữa theo chiều dọc */
            gap: 8px; /* Khoảng cách giữa chữ và số */
            padding: 5px 15px; 
            border-radius: 8px; 
            border: 2px solid #fff;
            background: #000; 
            font-weight: 900;
            font-family: 'Consolas', monospace;
        }
        
        .record-box span { font-size: 14px; text-transform: uppercase; color: #aaa; }
        .record-box div { font-size: 26px; } /* Số kỷ lục to rõ */
        
        #recS { border-color: var(--neon); color: var(--neon); }
        #recL { border-color: var(--pink); color: var(--pink); }

        button { 
            background: #ff4444; border: none; color: #fff; 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        textarea { 
            width: 100%; min-height: 250px; max-height: 750px;
            background: #000; color: #ffffff; 
            border: 1px solid #444; border-radius: 10px; padding: 12px; 
            font-family: 'Consolas', monospace; font-size: 22px; 
            font-weight: bold; resize: none; box-sizing: border-box; overflow-y: hidden;
            line-height: 1.3;
        }

        label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; text-align: center; font-weight: bold; }
        .count-tag { font-size: 22px; color: #000; background: #fff; padding: 0 10px; border-radius: 6px; font-weight: 900; }
    </style>
</head>
<body>

<div class="box">
    <div class="controls">
        <input type="file" id="f" multiple style="width: 140px; font-size: 10px;">
        
        <div style="display:flex; align-items:center; gap:5px;">
            <input type="text" id="numN" placeholder="N" readonly>
            <input type="number" id="numM" placeholder="M" inputmode="numeric">
            <span id="currentCount" class="count-tag">0</span>
        </div>
        
        <div class="record-container">
            <div class="record-box" id="recS">
                <span>Nhỏ</span>
                <div id="valS">0</div>
            </div>
            <div class="record-box" id="recL">
                <span>Lớn</span>
                <div id="valL">0</div>
            </div>
        </div>

        <button onclick="reset()">XÓA</button>
    </div>

    <div class="grid">
        <div class="col">
            <label>DÃY NHỎ (< 5)</label>
            <textarea id="os" readonly oninput="autoHeight(this)"></textarea>
        </div>
        <div class="col">
            <label>DÃY LỚN (≥ 5)</label>
            <textarea id="ol" readonly oninput="autoHeight(this)"></textarea>
        </div>
    </div>
</div>

<script>
    let raw = localStorage.getItem('big_data') || "";
    const inputN = document.getElementById('numN');
    const inputM = document.getElementById('numM');
    const outS = document.getElementById('os');
    const outL = document.getElementById('ol');
    const curCount = document.getElementById('currentCount');
    const valS = document.getElementById('valS');
    const valL = document.getElementById('valL');

    window.onload = () => { inputM.focus(); };

    function autoHeight(elem) {
        elem.style.height = 'auto';
        elem.style.height = (elem.scrollHeight) + 'px';
    }

    document.getElementById('f').onchange = async (e) => {
        let newContent = "";
        for (let file of e.target.files) {
            let t = await file.text();
            newContent += t.replace(/\s+/g, '').replace(/[^0-9]/g, '');
        }
        if (!raw.includes(newContent)) raw += newContent;
        localStorage.setItem('big_data', raw);
        inputM.focus();
    };

    inputM.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val.length === 0) return;
        const lastDigit = val.slice(-1);
        let currentN = inputN.value.replace(/[^0-9]/g, '');
        currentN = (currentN + lastDigit).slice(-3);
        inputN.value = currentN;
        inputM.value = "";
        if (currentN.length > 0) autoCalc(currentN);
    });

    function autoCalc(target) {
        if (!raw) return;
        let resS = new Set(), resL = new Set();
        let maxS = 0, maxL = 0;
        let i = raw.indexOf(target);

        while (i !== -1) {
            let start = i + target.length;
            let s = "", l = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n < 5) s += n; else break;
            }
            if (s) { resS.add(target + "-" + s); if (s.length > maxS) maxS = s.length; }
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n >= 5) l += n; else break;
            }
            if (l) { resL.add(target + "-" + l); if (l.length > maxL) maxL = l.length; }
            i = raw.indexOf(target, i + 1);
        }

        const sortFn = (a, b) => b.length - a.length;
        const sortedS = Array.from(resS).sort(sortFn);
        const sortedL = Array.from(resL).sort(sortFn);

        outS.value = sortedS.join('\n');
        outL.value = sortedL.join('\n');

        let lenS = sortedS[0] ? sortedS[0].split('-')[1].length : 0;
        let lenL = sortedL[0] ? sortedL[0].split('-')[1].length : 0;
        curCount.innerText = Math.max(lenS, lenL);

        valS.innerText = maxS;
        valL.innerText = maxL;

        autoHeight(outS);
        autoHeight(outL);
        outS.scrollTop = 0;
        outL.scrollTop = 0;
    }

    function reset() {
        if (confirm("XÓA HẾT?")) { localStorage.clear(); location.reload(); }
    }
    document.addEventListener('click', () => inputM.focus());
</script>
</body>
</html>
