<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX - PRO </title>
    <style>
        :root { 
            --neon: #00f3ff; --pink: #ff00ff; --bg: #030305;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
            --yellow: #ffff00;
        }

        body { 
            background: var(--bg); color: #fff; font-family: system-ui, sans-serif; 
            margin: 20px 10px; min-height: 100vh;
        }

        .box { max-width: 900px; margin: 0 auto; background: var(--glass); backdrop-filter: blur(20px); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; align-items: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }

        .count-row { display: flex; gap: 10px; width: 100%; justify-content: center; margin: 5px 0; }

        .count-mini-card {
            flex: 1; max-width: 150px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; padding: 5px; text-align: center;
        }

        .count-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        .count-value { 
            font-size: 48px; font-weight: 900; font-family: 'Courier New', monospace; 
            line-height: 1; text-shadow: 0 0 15px currentColor;
        }

        .c-small { border-color: var(--neon); color: var(--neon); }
        .c-large { border-color: var(--pink); color: var(--pink); }

        #alertBox {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            margin-top: 10px;
            background: rgba(255, 255, 0, 0.1);
            border: 2px solid var(--yellow);
            border-radius: 15px;
            color: var(--yellow);
            text-align: center;
            font-weight: 900;
            font-size: 24px;
            display: none; 
            animation: blink 1s infinite;
            letter-spacing: 2px; /* Chỉnh độ thưa ký tự vừa phải */
            white-space: pre;    /* Giữ nguyên khoảng trắng nhập từ JS */
            text-transform: none; /* Hiển thị đúng Hoa/Thường như đã nhập */
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 15px var(--yellow); }
            50% { opacity: 0.5; box-shadow: none; }
            100% { opacity: 1; box-shadow: 0 0 15px var(--yellow); }
        }

        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        
        /* Input type tel sẽ không bao giờ có mũi tên */
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        #numN { width: 80px; text-align: center; font-size: 1.2em; border-color: var(--neon); color: var(--neon); letter-spacing: 3px; }
        #numM { width: 50px; text-align: center; font-size: 1.2em; border-color: var(--pink); color: var(--pink); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: start; }
        textarea { 
            width: 100%; min-height: 60px; background: rgba(0,0,0,0.4); 
            color: #00ff41; border: 1px solid var(--border); border-radius: 10px; 
            padding: 12px; font-family: monospace; font-size: 18px; 
            resize: none; overflow: hidden; box-sizing: border-box;
            display: block;
        }
    </style>
</head>
<body>

<div class="box">
    <div id="msg" style="text-align:center; font-size:11px; color:var(--neon); margin-bottom:10px; font-family:monospace;">HỆ THỐNG SẴN SÀNG</div>
    
    <div class="controls">
        <div class="input-row">
            <input type="file" id="f" multiple style="width: 150px; font-size: 10px;">
            <input type="text" id="numN" placeholder="N" readonly tabindex="-1">
            <input type="tel" id="numM" placeholder="M">
        </div>

        <div class="count-row">
            <div class="count-mini-card c-small">
                <div class="count-label">MAX SL < 5</div>
                <div id="valS" class="count-value">0</div>
            </div>
            <div class="count-mini-card c-large">
                <div class="count-label">MAX SL ≥ 5</div>
                <div id="valL" class="count-value">0</div>
            </div>
        </div>

        <div id="alertBox"></div>
    </div>

    <div class="grid">
        <div class="col">
            <div style="font-size: 10px; color: #555; text-align: center; margin-bottom: 5px;">DÃY NHỎ (< 5)</div>
            <textarea id="os" readonly placeholder="Trống..."></textarea>
        </div>
        <div class="col">
            <div style="font-size: 10px; color: #555; text-align: center; margin-bottom: 5px;">DÃY LỚN (≥ 5)</div>
            <textarea id="ol" readonly placeholder="Trống..."></textarea>
        </div>
    </div>
</div>

<script>
    let raw = localStorage.getItem('big_data') || "";
    const inputN = document.getElementById('numN'), inputM = document.getElementById('numM');
    const outS = document.getElementById('os'), outL = document.getElementById('ol');
    const valS = document.getElementById('valS'), valL = document.getElementById('valL');
    const alertBox = document.getElementById('alertBox');
    const msg = document.getElementById('msg');

    window.onload = () => {
        inputM.focus();
        if (raw) msg.innerText = "DỮ LIỆU SẴN SÀNG: " + raw.length;
    };

    function autoResize(el) {
        el.style.height = 'auto'; 
        el.style.height = el.scrollHeight + 'px';
    }

document.getElementById('f').onchange = async (e) => {
        let newContent = "";
        
        // 1. Đọc nội dung từ các file mới được chọn
        for (let file of e.target.files) {
            newContent += (await file.text()).replace(/\s+/g, '').replace(/[^0-9]/g, '');
        }

        if (newContent) {
            // 2. XÓA DỮ LIỆU CŨ TRONG LOCAL STORAGE
            localStorage.removeItem('big_data'); 

            // 3. Gán dữ liệu mới vào biến tạm
            raw = newContent; 

            // 4. LƯU DỮ LIỆU MỚI VÀO LOCAL STORAGE (Ghi đè hoàn toàn)
            localStorage.setItem('big_data', raw);

            // 5. Cập nhật giao diện
            msg.innerText = "ĐÃ XÓA CŨ - NẠP MỚI: " + raw.length + " SỐ";
            
            // Reset các ô hiển thị kết quả của file cũ
            inputN.value = "";
            outS.value = "";
            outL.value = "";
            valS.innerText = "0";
            valL.innerText = "0";
            alertBox.style.display = "none";
        }
        
        // Reset input file để có thể chọn lại chính file đó nếu muốn
        e.target.value = ""; 
        inputM.focus();
    };

    

    inputM.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        // Lọc chỉ cho phép nhập số vào ô tel
        const cleanVal = val.replace(/[^0-9]/g, '');
        if (!cleanVal) { e.target.value = ""; return; }
        
        let currentN = inputN.value.replace(/[^0-9]/g, '');
        currentN = (currentN + cleanVal.slice(-1)).slice(-3);
        inputN.value = currentN;
        e.target.value = "";
        autoCalc(currentN);
    });

    function autoCalc(target) {
        if (!raw) return;
        let resS = new Set(), resL = new Set(), i = raw.indexOf(target);

        while (i !== -1) {
            let start = i + target.length, s = "", l = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n < 5) s += n; else break;
            }
            if (s) resS.add(target + "-" + s);
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n >= 5) l += n; else break;
            }
            if (l) resL.add(target + "-" + l);
            i = raw.indexOf(target, i + 1);
        }

        const sortFn = (a, b) => b.length - a.length;
        const sortedS = Array.from(resS).sort(sortFn);
        const sortedL = Array.from(resL).sort(sortFn);

        outS.value = sortedS.join('\n');
        outL.value = sortedL.join('\n');

        const lenS = sortedS.length > 0 ? sortedS[0].split('-')[1].length : 0;
        const lenL = sortedL.length > 0 ? sortedL[0].split('-')[1].length : 0;

        valS.innerText = lenS;
        valL.innerText = lenL;

        if (lenS === 0 && lenL === 0) {
            alertBox.style.display = "none";
        } else {
            alertBox.style.display = "block";
            // CHÍNH XÁC 5 DẤU CÁCH VÀ CHỮ THƯỜNG/HOA ĐÚNG Ý BẠN
            const s5 = "     "; 
            
            if (lenS > lenL) {
                alertBox.innerText = `Dùng${s5}NHỎ   ${lenS}  lần`;
            } else if (lenL > lenS) {
                alertBox.innerText = `Dùng${s5}LỚN   ${lenL}  lần`;
            } else {
                alertBox.innerText = `cân bằng${s5}${lenS}    lần`;
            }
        }

        autoResize(outS); autoResize(outL);
    }

    document.addEventListener('click', (e) => {
        if(!['INPUT','TEXTAREA'].includes(e.target.tagName)) {
            inputM.focus();
        }
    });
</script>
</body>
</html>
