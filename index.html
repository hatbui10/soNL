<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Số - Dark Mode Bảo Mật</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #161616;
            --text-main: #e0e0e0;
            --border-color: #2a2a2a;
            --accent-small: #00ff88;
            --accent-large: #ff4d4d;
            --input-bg: #222;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            padding: 20px; 
            color: var(--text-main); 
        }

        .security-section {
            max-width: 700px; margin: 0 auto 15px; 
            background: #1a1a1a; color: white;
            padding: 15px; border-radius: 12px; text-align: center; 
            display: flex; justify-content: center; align-items: center; gap: 10px;
            border: 1px solid var(--border-color);
        }

        .input-section { 
            text-align: center; margin-bottom: 25px; 
            background: var(--bg-card); padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            max-width: 700px; margin-left: auto; margin-right: auto;
            border: 1px solid var(--border-color);
        }
        
        input, select, button { 
            padding: 12px; font-size: 16px; border-radius: 6px; 
            border: 1px solid var(--border-color); 
            outline: none; margin: 5px; 
            background: var(--input-bg); color: white;
        }
        
        .btn-save { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; padding: 12px 30px; }
        .btn-save:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        .btn-undo { background-color: #444; color: #ffcc00; border: none; cursor: pointer; font-weight: bold; }
        .btn-undo:disabled { background-color: #333; color: #666; cursor: not-allowed; }

        .container { display: flex; gap: 20px; max-width: 1000px; margin: 0 auto; align-items: flex-start; }
        .column { 
            flex: 1; background: var(--bg-card); 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            overflow: hidden; border: 1px solid var(--border-color);
        }
        
        .header { padding: 15px; text-align: center; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
        .bg-large { color: var(--accent-large); }
        .bg-small { color: var(--accent-small); }
        
        .group-row { padding: 12px 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; }
        .group-row:last-child { border-bottom: none; }
        
        .tens-label { 
            background: #2a2a2a; color: #888; 
            padding: 4px 8px; border-radius: 4px; font-size: 12px; 
            margin-right: 15px; min-width: 40px; text-align: center; font-weight: bold; 
        }
        .numbers-list { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 1px; }
        
        #lock-status { font-weight: bold; margin-right: 10px; }
        .status-locked { color: var(--accent-large); }
        .status-unlocked { color: var(--accent-small); }
    </style>
</head>
<body>

<div class="security-section">
    <span id="lock-status" class="status-locked">🔒 ĐANG KHÓA (CHỈ XEM)</span>
    <input type="password" id="pinInput" placeholder="Mã PIN 6 số..." maxlength="6" style="width: 130px;">
    <button onclick="unlockApp()" style="background: #333;">XÁC THỰC</button>
    <button onclick="lockApp()" style="background: #000; font-size: 11px;">KHÓA LẠI</button>
</div>

<div class="input-section">
    <h2 style="color: #fff; margin-top: 0;">HỆ THỐNG PHÂN LOẠI SỐ</h2>
    <input type="text" id="numInput" placeholder="Nhập số mới..." disabled>
    <select id="typeSelect" disabled>
        <option value="small">Cột NHỎ</option>
        <option value="large">Cột LỚN</option>
    </select>
    <button class="btn-save" id="saveBtn" onclick="addData()" disabled>LƯU</button>
    <button class="btn-undo" id="undoBtn" onclick="undo()" disabled>HOÀN TÁC (UNDO)</button>
</div>

<div class="container">
    <div class="column">
        <div class="header bg-large">Nhóm Lớn</div>
        <div id="largeList"></div>
    </div>
    <div class="column">
        <div class="header bg-small">Nhóm Nhỏ</div>
        <div id="smallList"></div>
    </div>
</div>

<script>
localStorage.clear(); 
    const MY_PIN = "123456"; 

    // CHUYỂN DỮ LIỆU SANG DẠNG CHUỖI "" ĐỂ GIỮ SỐ 0
    let defaultSmall = ["00", "02", "14", "21", "22", "30", "32", "33", "40", "44", "56", "57", "65", "66", "70", "75", "86", "89", "95", "98", "210", "390", "480", "490", "891", "993"];
    let defaultLarge = ["10", "11", "20", "50", "55", "60", "62", "77", "80", "84", "85", "88", "90", "99", "570", "610"];

    let  smallNumbers = JSON.parse(localStorage.getItem('smallData')) || defaultSmall;
    let largeNumbers = JSON.parse(localStorage.getItem('largeData')) || defaultLarge;
    let historyStack = [];

    function unlockApp() {
        if(document.getElementById('pinInput').value === MY_PIN) {
            document.getElementById('lock-status').innerText = "🔓 ĐÃ MỞ QUYỀN SỬA";
            document.getElementById('lock-status').className = "status-unlocked";
            document.getElementById('numInput').disabled = false;
            document.getElementById('typeSelect').disabled = false;
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('undoBtn').disabled = false;
            document.getElementById('pinInput').style.display = 'none';
        } else {
            alert("Sai mã PIN!");
        }
    }

    function lockApp() { location.reload(); }

    function render() {
        localStorage.setItem('smallData', JSON.stringify(smallNumbers));
        localStorage.setItem('largeData', JSON.stringify(largeNumbers));
        renderColumn('smallList', smallNumbers);
        renderColumn('largeList', largeNumbers);
    }

    function renderColumn(elementId, numberArray) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';

        numberArray.sort((a, b) => parseInt(a) - parseInt(b));

        const groups = {};
        numberArray.forEach(num => {
            const numeric = parseInt(num, 10);
            const key = isNaN(numeric) ? "?" : Math.floor(numeric / 10);

            if (!groups[key]) groups[key] = [];

            // 👉 GIỮ NGUYÊN num, KHÔNG SỬA FORMAT
            if (!groups[key].includes(num)) {
                groups[key].push(num);
            }
        });

        Object.keys(groups).sort((a, b) => a - b).forEach(key => {
            const row = document.createElement('div');
            row.className = 'group-row';
            row.innerHTML = `<span class="tens-label">${key}x</span>
                             <span class="numbers-list">${groups[key].join(', ')}</span>`;
            container.appendChild(row);
        });
    }

    function addData() {
        const input = document.getElementById('numInput');
        const value = input.value.trim();

        if (value === "" || isNaN(value)) return;

        historyStack.push({ s: [...smallNumbers], l: [...largeNumbers] });
        if(historyStack.length > 30) historyStack.shift();

        if (document.getElementById('typeSelect').value === 'small') {
            smallNumbers.push(value);
        } else {
            largeNumbers.push(value);
        }

        input.value = '';
        render();
    }

    function undo() {
        if(historyStack.length > 0) {
            let last = historyStack.pop();
            smallNumbers = last.s; 
            largeNumbers = last.l;
            render();
        }
    }

    render();
</script>
</body>
</html>
