<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Multi-File Data Scanner Pro v13.0 - No Duplicates</title>
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --neon-gold: #ffbd39;
            --neon-green: #00ff88;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #101520 0%, #05070a 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; padding: 30px; margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 1400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { 
            text-align: center; color: #fff; font-weight: 300; letter-spacing: 3px;
            text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 30px;
        }

        .upload-section {
            background: rgba(255,255,255,0.02);
            border: 1px dashed #444; padding: 25px; text-align: center;
            border-radius: 15px; margin-bottom: 25px; transition: 0.3s;
        }
        .upload-section:hover { border-color: var(--neon-blue); background: rgba(0,210,255,0.05); }

        #fileInput { display: none; }
        .btn-upload {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 12px 30px; cursor: pointer; border-radius: 30px; font-weight: 600;
            text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: inline-block;
        }
        .btn-upload:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        #fileStatus { margin-top: 15px; font-size: 0.85rem; color: var(--neon-blue); font-style: italic; }

        textarea {
            width: 100%; height: 120px; background: rgba(0,0,0,0.3); border: 1px solid #222;
            border-radius: 12px; color: var(--neon-green); padding: 15px; font-family: monospace;
            box-sizing: border-box; resize: none; margin-bottom: 20px; outline: none;
        }

        .toolbar { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }

        .btn-main {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 12px 35px; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s;
        }
        .btn-main:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 25px var(--neon-green); }

        .btn-export {
            background: transparent; border: 1px solid var(--neon-gold); color: var(--neon-gold);
            padding: 12px 35px; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s;
        }
        .btn-export:hover { background: var(--neon-gold); color: #000; box-shadow: 0 0 25px var(--neon-gold); }

        .results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .box { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            border-radius: 18px; height: 500px; display: flex; flex-direction: column; overflow: hidden;
        }

        .label { 
            padding: 15px; font-size: 0.85rem; font-weight: bold; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;
        }

        .copy-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff;
            padding: 4px 10px; font-size: 0.7rem; border-radius: 5px; cursor: pointer;
        }

        .display { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 13px; color: #aaa; line-height: 2.2; }
        .tag { display: inline-block; margin: 3px; padding: 0 8px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 5px; color: #eee; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>DATA SCANNER (NO DUPLICATES)</h2>
    
    <div class="upload-section">
        <label for="fileInput" class="btn-upload">CHỌN NHIỀU FILE .TXT</label>
        <input type="file" id="fileInput" accept=".txt" multiple>
        <div id="fileStatus">Chưa có file nào được nạp</div>
    </div>

    <textarea id="input" placeholder="Dữ liệu gộp sẽ hiển thị tại đây..."></textarea>
    
    <div class="toolbar">
        <button class="btn-main" onclick="runAnalysis()">PHÂN TÍCH & LỌC TRÙNG</button>
        <button class="btn-export" onclick="exportFullFile()">XUẤT FILE TỔNG HỢP</button>
        <button style="border-color: #444; color: #888;" class="btn-main" onclick="clearData()">XÓA TẤT CẢ</button>
    </div>

    <div class="results">
        <div class="box">
            <div class="label" style="color: var(--neon-pink);">
                <span>TỆP LỚN (B > 5) <small id="countL">0</small></span>
                <button class="copy-btn" onclick="copyResult('finalL')">COPY</button>
            </div>
            <div id="resL" class="display"></div>
        </div>

        <div class="box">
            <div class="label" style="color: var(--neon-blue);">
                <span>TỆP NHỎ (B < 5) <small id="countN">0</small></span>
                <button class="copy-btn" onclick="copyResult('finalN')">COPY</button>
            </div>
            <div id="resN" class="display"></div>
        </div>

        <div class="box">
            <div class="label" style="color: var(--neon-gold);">
                <span>TRUNG GIAN <small id="countTG">0</small></span>
            </div>
            <div id="resTG" class="display"></div>
        </div>
    </div>
</div>

<script>
    let finalL = [], finalN = [], finalTG = [];

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        document.getElementById('fileStatus').innerText = `Đang nạp ${files.length} file...`;
        let combinedText = "";
        for (let file of files) {
            const text = await file.text();
            combinedText += text + " ";
        }
        document.getElementById('input').value = combinedText;
        document.getElementById('fileStatus').innerText = `Đã nạp xong ${files.length} file.`;
        runAnalysis();
    });

    function runAnalysis() {
        const raw = document.getElementById('input').value.replace(/\D/g, '');
        if (!raw || raw.length < 10) return;

        // Sử dụng Set để tự động loại bỏ các chuỗi trùng lặp
        let setL = new Set();
        let setN = new Set();
        let setTG = new Set();

        for (let i = 0; i <= raw.length - 10; i++) {
            let full10 = raw.substring(i, i + 10);
            let A = full10.substring(0, 5);
            let B = full10.substring(5, 10);
            
            let digitsB = B.split('').map(n => parseInt(n));
            let isAllSmall = digitsB.every(d => d < 5);
            let isAllLarge = digitsB.every(d => d > 5);

            let resultString = `${A}-${B}`;

            if (isAllSmall) setN.add(resultString);
            else if (isAllLarge) setL.add(resultString);
            else setTG.add(resultString);
        }

        // Chuyển Set ngược lại thành Array để hiển thị
        finalL = Array.from(setL);
        finalN = Array.from(setN);
        finalTG = Array.from(setTG);

        updateUI();
    }

    function updateUI() {
        const draw = (id, arr, cId) => {
            document.getElementById(id).innerHTML = arr.map(v => `<span class="tag">${v}</span>`).join('');
            document.getElementById(cId).innerText = `(${arr.length})`;
        };
        draw('resL', finalL, 'countL');
        draw('resN', finalN, 'countN');
        draw('resTG', finalTG, 'countTG');
    }

    function copyResult(arrayName) {
        let arr = arrayName === 'finalL' ? finalL : finalN;
        if (arr.length === 0) return alert("Không có dữ liệu!");
        navigator.clipboard.writeText(arr.join('\n')).then(() => alert("Đã copy!"));
    }

    function exportFullFile() {
        if (finalL.length === 0 && finalN.length === 0) return alert("Không có dữ liệu!");
        const content = `TỆP NHỎ (B < 5):\n${finalN.join('\n')}\n\n\nTỆP LỚN (B > 5):\n${finalL.join('\n')}`;
        const BOM = '\uFEFF';
        const blob = new Blob([BOM + content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Ket_qua_khong_trung_${new Date().getTime()}.txt`;
        a.click();
    }

    function clearData() {
        if(confirm("Xóa toàn bộ dữ liệu?")) { 
            document.getElementById('input').value = "";
            document.getElementById('fileStatus').innerText = "Chưa có file nào được nạp";
            finalL = []; finalN = []; finalTG = [];
            updateUI();
        }
    }
</script>
</body>
</html>
