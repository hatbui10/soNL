<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng nhập 1 ký tự</title>

<style>
* {
    box-sizing: border-box;
}

/* NỀN */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(
        1200px 600px at 20% 10%,
        #3b1d5a,
        #1f1237 60%,
        #0f0a1f 100%
    );
    padding: 40px;
    display: flex;
    justify-content: center;
}

/* HỘP CHÍNH */
.box {
    background: linear-gradient(180deg, #1f2937, #111827);
    border: 2px solid #334155;
    border-radius: 18px;
    padding: 24px 26px 28px;
    box-shadow:
        0 18px 36px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ĐIỀU KHIỂN */
.controls {
    text-align: center;
    margin-bottom: 18px;
}

.controls input {
    width: 78px;
    padding: 8px;
    margin: 0 6px;
    text-align: center;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #c7d2fe;
}

.controls button {
    padding: 8px 18px;
    margin: 6px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(79,70,229,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.controls button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(79,70,229,0.45);
}

/* GRID */
.grid {
    display: grid;
    gap: 6px;
}

/* HEADER HÀNG / CỘT */
.header {
    width: 44px;
    height: 44px;
    line-height: 44px;
    text-align: center;

    background: linear-gradient(180deg, #1e293b, #0f172a); /* xanh đậm */
    color: #c7d2fe; /* tím nhạt */

    border: 2px solid #334155;
    border-radius: 10px;

    font-size: 14px;
    font-weight: 600;

    user-select: none;   /* khỏi bôi đen cho đỡ ngứa tay */
}

/* Ô NHẬP */
.cell {
    width: 44px;
    height: 44px;
    line-height: 44px;
    padding: 0;
    text-align: center;

    background: linear-gradient(180deg, #1e293b, #0f172a); /* xanh đậm */
    color: #e5e7eb; /* chữ sáng vừa đủ */

    border: 2px solid #4f46e5; /* tím-xanh dịu */
    border-radius: 10px;

    font-size: 20px;
    font-weight: 600;

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.06),
        0 4px 10px rgba(0,0,0,0.35);
}
/* HOVER Ô */
.cell:hover {
    border-color: #6366f1;
    box-shadow:
        0 6px 14px rgba(99,102,241,0.35);
    transform: translateY(-1px);
    background: #ffffff;
}

/* FOCUS Ô */
.cell:focus {
    border-color: #4f46e5;
    box-shadow:
        0 0 0 2px rgba(99,102,241,0.35),
        0 8px 18px rgba(79,70,229,0.45);
    background: #ffffff;
    transform: scale(1.06);
}



</style>
</head>
<body>

<div class="box">
    <div class="controls">
        Hàng:
        <input type="number" id="rows" value="20" min="1">
        Cột:
        <input type="number" id="cols" value="10" min="1">
        <br><br>
        <button onclick="buildGrid()">Tạo bảng</button>
        <button onclick="saveGrid()">Lưu</button>
        <button onclick="clearGrid()">Xóa bảng</button>
        <button onclick="exportExcel()">Xuất Excel</button>
    </div>

    <div id="grid" class="grid"></div>
</div>

<script>
const rowsInput = document.getElementById("rows");
const colsInput = document.getElementById("cols");
const grid = document.getElementById("grid");

/* ================= BUILD GRID ================= */
function buildGrid(data = null) {
    const rows = +rowsInput.value;
    const cols = +colsInput.value;

    grid.innerHTML = "";
    grid.style.gridTemplateColumns = `48px repeat(${cols}, 44px)`;

    // ô góc trên trái
    grid.appendChild(document.createElement("div"));

    // header cột (0 → cols-1)
    for (let c = 0; c < cols; c++) {
        const h = document.createElement("div");
        h.className = "header";
        h.textContent = c;
        grid.appendChild(h);
    }

    // từng hàng
    for (let r = 0; r < rows; r++) {

        // header hàng
        const rowHeader = document.createElement("div");
        rowHeader.className = "header";
        rowHeader.textContent = r;
        grid.appendChild(rowHeader);

        for (let c = 0; c < cols; c++) {
            const input = document.createElement("input");
            input.className = "cell";
            input.type = "text";
            input.maxLength = 1;
            input.dataset.row = r;
            input.dataset.col = c;

            if (data?.[r]?.[c] !== undefined) {
                input.value = data[r][c];
            }

            // tự nhảy ô
            input.addEventListener("input", () => {
                input.value = input.value.slice(0, 1);
                if (input.value) focusNextCell(input);
            });

            grid.appendChild(input);
        }
    }

    focusFirstCell();
}

/* ================= FOCUS ================= */
function focusFirstCell() {
    requestAnimationFrame(() => {
        document.querySelector(
            '.cell[data-row="0"][data-col="0"]'
        )?.focus();
    });
}

function focusNextCell(current) {
    const r = +current.dataset.row;
    const c = +current.dataset.col;
    const rows = +rowsInput.value;
    const cols = +colsInput.value;

    let nextR = r;
    let nextC = c + 1;

    if (nextC >= cols) {
        nextC = 0;
        nextR++;
    }

    if (nextR >= rows) return;

    document.querySelector(
        `.cell[data-row="${nextR}"][data-col="${nextC}"]`
    )?.focus();
}

/* ================= DATA ================= */
function getGridData() {
    const rows = +rowsInput.value;
    const cols = +colsInput.value;
    const data = Array.from({ length: rows }, () => Array(cols).fill(""));

    document.querySelectorAll(".cell").forEach(cell => {
        data[cell.dataset.row][cell.dataset.col] = cell.value;
    });

    return data;
}

/* ================= ACTIONS ================= */
function saveGrid() {
    localStorage.setItem("gridData", JSON.stringify({
        rows: +rowsInput.value,
        cols: +colsInput.value,
        data: getGridData()
    }));
    alert("Đã lưu bảng");
}

function clearGrid() {
    document.querySelectorAll(".cell").forEach(cell => cell.value = "");
    focusFirstCell();
}

function exportExcel() {
    const csv = getGridData()
        .map(row => row.map(v => `"${v}"`).join(","))
        .join("\n");

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "bang_du_lieu.csv";
    a.click();
}

/* ================= INIT ================= */
(function init() {
    const saved = localStorage.getItem("gridData");
    if (!saved) {
        buildGrid();
        return;
    }

    const payload = JSON.parse(saved);
    rowsInput.value = payload.rows;
    colsInput.value = payload.cols;
    buildGrid(payload.data);
})();
</script>

</body>
</html>
